# ~/.config/starship.toml ÔÇö my personal prompt
# yuumi.starship powerline ÔÇö pastel theme inspired by Yuumi (League of Legends)
# Full theme repo: https://github.com/aroaxinping/yuumi-starship
# Language & tool icons adapted from the Gruvbox Rainbow preset.
# Needs a Nerd Font for the powerline separators and icons.

"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

format = """
[¯éÂ](iris)\
$os\
$username\
[¯é░](fg:iris bg:foam)\
$directory\
[¯é░](fg:foam bg:rose)\
$git_branch\
$git_status\
[¯é░](fg:rose bg:gold)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:gold bg:pine)\
$docker_context\
$conda\
$pixi\
[¯é░](fg:pine bg:overlay)\
$time\
[¯é┤](fg:overlay)\
$line_break$character"""

palette = "yuumi"

[palettes.yuumi]
base = '#151225'
overlay = '#231f3d'
muted = '#7a749e'
subtle = '#a39cc7'
text = '#f7f3ea'
love = '#e88fa3'
gold = '#efc873'
rose = '#f5a9c5'
pine = '#5b4e8c'
foam = '#8fcbe8'
iris = '#a6a0de'

[os]
disabled = false
style = "bg:iris fg:base"

[os.symbols]
Macos = "¾░äø"
Windows = "¾░äø"
Ubuntu = "¾░äø"
Linux = "¾░äø"
Arch = "¾░äø"
Debian = "¾░äø"
Fedora = "¾░äø"
Alpine = "¾░äø"
Manjaro = "¾░äø"
Mint = "¾░äø"
Pop = "¾░äø"
Redhat = "¾░äø"
SUSE = "¾░äø"
Raspbian = "¾░äø"
Android = "¾░äø"

[username]
show_always = true
style_user = "bg:iris fg:base"
style_root = "bg:iris fg:base"
format = '[ $user ]($style)'

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:rose"
format = '[[ $symbol $branch ](fg:base bg:rose)]($style)'

[git_status]
style = "bg:rose"
format = '[[($all_status$ahead_behind )](fg:base bg:rose)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[cpp]
symbol = "¯ÿØ "
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[bun]
symbol = "¯Ø»"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[java]
symbol = "¯ëû"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:pine"
format = '[[ $symbol( $context) ](fg:text bg:pine)]($style)'

[conda]
symbol = ""
style = "bg:pine"
format = '[[ $symbol $environment ](fg:text bg:pine)]($style)'

[pixi]
style = "bg:pine"
format = '[[ $symbol( $version)( $environment) ](fg:text bg:pine)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:overlay"
format = '[[ ´É║ $time ](fg:subtle bg:overlay)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[´É▓](bold fg:foam)'
error_symbol = '[´É▓](bold fg:love)'
vimcmd_symbol = '[´É┤](bold fg:iris)'
