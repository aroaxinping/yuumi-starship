# ~/.config/starship.toml — my personal prompt
# yuumi.starship powerline — pastel theme inspired by Yuumi (League of Legends)
# Full theme repo: https://github.com/aroaxinping/yuumi-starship
# Language & tool icons adapted from the Gruvbox Rainbow preset.
# Needs a Nerd Font for the powerline separators and icons.

"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

format = """
[](iris)\
$os\
$username\
[](fg:iris bg:foam)\
$directory\
[](fg:foam bg:rose)\
$git_branch\
$git_status\
[](fg:rose bg:gold)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:gold bg:pine)\
$docker_context\
$conda\
$pixi\
[](fg:pine bg:overlay)\
$time\
[](fg:overlay)\
$line_break$character"""

palette = "yuumi"

[palettes.yuumi]
base = '#151225'
overlay = '#231f3d'
muted = '#7a749e'
subtle = '#a39cc7'
text = '#f7f3ea'
love = '#e88fa3'
gold = '#efc873'
rose = '#f5a9c5'
pine = '#5b4e8c'
foam = '#8fcbe8'
iris = '#a6a0de'

[os]
disabled = false
style = "bg:iris fg:base"

[os.symbols]
Macos = "󰄛"
Windows = "󰄛"
Ubuntu = "󰄛"
Linux = "󰄛"
Arch = "󰄛"
Debian = "󰄛"
Fedora = "󰄛"
Alpine = "󰄛"
Manjaro = "󰄛"
Mint = "󰄛"
Pop = "󰄛"
Redhat = "󰄛"
SUSE = "󰄛"
Raspbian = "󰄛"
Android = "󰄛"

[username]
show_always = true
style_user = "bg:iris fg:base"
style_root = "bg:iris fg:base"
format = '[ $user ]($style)'

[directory]
style = "fg:base bg:foam"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:rose"
format = '[[ $symbol $branch ](fg:base bg:rose)]($style)'

[git_status]
style = "bg:rose"
format = '[[($all_status$ahead_behind )](fg:base bg:rose)]($style)'

[c]
symbol = " "
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[cpp]
symbol = " "
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[rust]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[golang]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[nodejs]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[bun]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[php]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[java]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[kotlin]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[haskell]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[python]
symbol = ""
style = "bg:gold"
format = '[[ $symbol( $version) ](fg:base bg:gold)]($style)'

[docker_context]
symbol = ""
style = "bg:pine"
format = '[[ $symbol( $context) ](fg:text bg:pine)]($style)'

[conda]
symbol = ""
style = "bg:pine"
format = '[[ $symbol $environment ](fg:text bg:pine)]($style)'

[pixi]
style = "bg:pine"
format = '[[ $symbol( $version)( $environment) ](fg:text bg:pine)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:overlay"
format = '[[  $time ](fg:subtle bg:overlay)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:foam)'
error_symbol = '[](bold fg:love)'
vimcmd_symbol = '[](bold fg:iris)'
