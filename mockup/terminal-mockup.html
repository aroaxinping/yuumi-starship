<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
  }
  .window {
    width: 640px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    font-family: 'FiraCode Nerd Font', 'FiraCode Nerd Font Mono', 'Menlo', monospace;
  }
  .titlebar {
    background: #2a2640;
    height: 34px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }
  .title {
    flex: 1;
    text-align: center;
    color: #a39cc7;
    font-size: 12px;
    margin-right: 60px;
  }
  .body {
    background: #151225;
    padding: 22px 20px 28px;
    font-size: 15px;
    line-height: 1.9;
  }
  .muted { color: #7a749e; }
  .iris { color: #a6a0de; }
  .foam { color: #8fcbe8; font-weight: 600; }
  .pine { color: #5b4e8c; font-weight: 600; }
  .love { color: #e88fa3; font-weight: 600; }
  .gold { color: #efc873; }
  .rose { color: #f5a9c5; font-weight: 600; }
  .text { color: #f7f3ea; }
  .line { white-space: pre; }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="title">yuumi.starship — zsh</div>
    </div>
    <div class="body">
      <div class="line"><span class="muted">╭╴</span><span class="iris">󰄛 </span></div>
      <div class="line"><span class="muted">╰─</span><span class="text">at </span><span class="foam">~/yuumi-starship</span><span class="text"> on </span><span class="pine">⎇ main</span> <span class="love">(!1)</span></div>
      <div class="line"><span class="foam">❯</span> <span class="text">git add yuumi.toml</span></div>
      <div class="line"><span class="muted">╭╴</span><span class="iris">󰄛 </span></div>
      <div class="line"><span class="muted">╰─</span><span class="text">at </span><span class="foam">~/yuumi-starship</span><span class="text"> on </span><span class="pine">⎇ main</span> <span class="gold">(++1)</span></div>
      <div class="line"><span class="rose">❯</span><span class="text"> </span></div>
    </div>
  </div>
</body>
</html>
