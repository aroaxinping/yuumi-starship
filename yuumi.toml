# yuumi.toml â€” a pastel Starship theme inspired by Yuumi (League of Legends)
# Fan-made palette, not affiliated with or endorsed by Riot Games.
# Symbols list: https://starship.rs/presets/nerd-font

"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 5000

# Inserts a blank line between shell prompts
add_newline = false

# Yuumi palette â€” pastel lavender, sky blue, gold magic, soft pink
palette = "yuumi"

[palettes.yuumi]
base = '#151225'
overlay = '#231f3d'
muted = '#7a749e'
subtle = '#a39cc7'
text = '#f7f3ea'
love = '#e88fa3'
gold = '#efc873'
rose = '#f5a9c5'
pine = '#5b4e8c'
foam = '#8fcbe8'
iris = '#a6a0de'

# Change the default prompt format
format = """\
[â•­â•´](muted)\
$os\
${custom.environment}\
$jobs\
$env_var\
$all\
[â•°â”€](muted)\
$character\
"""

# Custom command to show the environment (set $CONTEXT_ENV to use)
[custom.environment]
when = "test ! -z $CONTEXT_ENV"
style = "gold"
command = "echo $CONTEXT_ENV"
format = "[$output]($style) "

# Change the default prompt characters
[character]
success_symbol = "[](foam)"
error_symbol = "[](love)"

# Shows an icon set via $STARSHIP_DISTRO in your shell rc
[env_var.STARSHIP_DISTRO]
format = '[$env_value](bold text)'
variable = "STARSHIP_DISTRO"
disabled = false

[os]
format = '[$symbol]($style) '
style = "iris"
disabled = false

