# Shows the username
[username]
style_user = "bold text"
style_root = "bold love"
format = "[$user]($style) "
disabled = true
show_always = false

[directory]
truncation_length = 3
truncation_symbol = "â€¦/"
home_symbol = " ~"
read_only_style = "love"
read_only = "  "
format = "at [$path](bold foam)[$read_only]($read_only_style) "

[git_branch]
symbol = "َ°ٹ¢ "
format = "on [$symbol$branch]($style) "
truncation_length = 15
truncation_symbol = "â€¦/"
